version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "America/Chicago"
    open-pull-requests-limit: 3
    rebase-strategy: "auto"
    commit-message:
      prefix: "deps"
      include: "scope"
    # Security-focused configuration
    allow:
      - dependency-type: "security"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "America/Chicago"
    commit-message:
      prefix: "deps"
      include: "scope"
